<app-page-card
  class="cadastro-form-page"
  [titulo]="tituloPagina"
  subtitulo="Defina dimensões e área útil."
  [helpRota]="['/page/ajuda']"
  helpFragment="produtos"
  helpTexto=""
  helpIcone="help_outline"
  botaoTexto="Voltar"
  botaoIcone="arrow_back"
  botaoCor="primary"
  [botaoRota]="['/page/cadastro-tecnico/formatos']"
  [mostrarDivisor]="true">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-formato">
    <app-section-card titulo="Dados principais" subtitulo="Identifique o formato.">
      <div class="cadastro-form-grid cadastro-form-grid--single">
        <app-input-texto-restrito [control]="nomeControl" label="Nome" placeholder="Digite o nome do formato">
        </app-input-texto-restrito>
      </div>
    </app-section-card>

    <app-section-card titulo="Dimensões" subtitulo="Configure tamanho total e área útil.">
      <div class="cadastro-form-grid cadastro-form-grid--double">
        <app-input-numerico [control]="larguraControl" label="Largura (cm)"></app-input-numerico>
        <app-input-numerico [control]="alturaControl" label="Altura (cm)"></app-input-numerico>
        <app-input-numerico [control]="larguraUtilControl" label="Largura útil (cm)"></app-input-numerico>
        <app-input-numerico [control]="alturaUtilControl" label="Altura útil (cm)"></app-input-numerico>
      </div>
    </app-section-card>

    <div class="cadastro-form-actions" *ngIf="!isMobileView">
      <button mat-stroked-button color="primary" type="button" (click)="voltar()">
        Voltar
      </button>

      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
        {{ textoAcaoPrincipal }}
      </button>
    </div>
  </form>
</app-page-card>

<app-mobile-total-bar
  *ngIf="isMobileView"
  label="Cadastro"
  valueText="Formato"
  detailText="Dimensões e área útil"
  [expandable]="false"
  secondaryActionText="Voltar"
  [actionText]="textoAcaoPrincipal"
  [actionDisabled]="form.invalid"
  bottomOffset="58px"
  [attachedToBottomNav]="true"
  (secondaryAction)="voltar()"
  (action)="onSubmit()">
</app-mobile-total-bar>
