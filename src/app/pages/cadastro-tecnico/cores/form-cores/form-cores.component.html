<app-page-card
    class="cadastro-form-page"
    [titulo]="tituloPagina"
    subtitulo="Cadastro rápido e direto."
    [helpRota]="['/page/ajuda']"
    helpFragment="produtos"
    helpTexto=""
    helpIcone="help_outline"
    botaoTexto="Voltar"
    botaoIcone="arrow_back"
    botaoCor="primary"
    [botaoRota]="['/page/cadastro-tecnico/cores']"
    [mostrarDivisor]="true">

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <app-section-card titulo="Dados principais" subtitulo="Defina nome e descrição da cor.">
            <div class="cadastro-form-grid cadastro-form-grid--single">
                <app-input-texto-restrito [control]="nomeControl" label="Nome" placeholder="Digite o nome da cor">
                </app-input-texto-restrito>

                <app-input-texto-restrito [control]="descricaoControl" label="Descrição"
                    placeholder="Digite uma descrição">
                </app-input-texto-restrito>
            </div>
        </app-section-card>

        <div class="cadastro-form-actions" *ngIf="!isMobileView">
            <button mat-stroked-button color="primary" type="button" (click)="voltar()">
                Voltar
            </button>

            <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
                {{ textoAcaoPrincipal }}
            </button>
        </div>
    </form>
</app-page-card>

<app-mobile-total-bar
    *ngIf="isMobileView"
    label="Cadastro"
    valueText="Cor"
    detailText="Dados principais"
    [expandable]="false"
    secondaryActionText="Voltar"
    [actionText]="textoAcaoPrincipal"
    [actionDisabled]="form.invalid"
    bottomOffset="58px"
    [attachedToBottomNav]="true"
    (secondaryAction)="voltar()"
    (action)="onSubmit()">
</app-mobile-total-bar>
