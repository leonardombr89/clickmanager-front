<app-page-card
  [titulo]="isEditMode ? 'Editar Acabamento' : 'Novo Acabamento'"
  subtitulo="Cadastre o acabamento e configure as variações de aplicação e preço."
  botaoTexto="Voltar"
  botaoIcone="arrow_back"
  botaoCor="primary"
  [botaoRota]="['/page/cadastro-tecnico/acabamentos']"
  [mostrarDivisor]="true">

  <app-section-card
    titulo="Dados principais"
    subtitulo="Informe o nome e descreva quando esse acabamento deve ser utilizado."
    [divider]="true">
    <form class="row g-3" [formGroup]="form">
      <div class="col-12 col-md-6">
        <app-input-texto-restrito
          [control]="nomeControl"
          label="Nome"
          placeholder="Ex.: Laminação fosca premium"
          [maxlength]="120">
        </app-input-texto-restrito>
      </div>

      <div class="col-12">
        <app-input-textarea
          [control]="descricaoControl"
          label="Descrição"
          placeholder="Explique a aplicação, características e contexto de uso do acabamento."
          [rows]="5"
          [maxlength]="1000">
        </app-input-textarea>
      </div>
    </form>
  </app-section-card>

  <app-section-card
    titulo="Variações"
    subtitulo="Configure as combinações de material, formato, aplicação e preço do acabamento."
    [divider]="true">
    <app-variacoes-acabamento
      [variacoesIniciais]="variacoesIniciais"
      (variacoesChange)="onVariacoesChange($event)">
    </app-variacoes-acabamento>
  </app-section-card>

  <div class="actions-row">
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="onSubmit()"
      [disabled]="form.invalid || loading">
      {{ loading ? 'Salvando...' : (isEditMode ? 'Atualizar' : 'Salvar') }}
    </button>

    <button
      mat-stroked-button
      color="primary"
      type="button"
      [routerLink]="['/page/cadastro-tecnico/acabamentos']">
      Voltar
    </button>
  </div>
</app-page-card>
