<app-page-card
  class="cadastro-form-page"
  [titulo]="tituloPagina"
  subtitulo="Defina o serviço e a cobrança base."
  [helpRota]="['/page/ajuda']"
  helpFragment="produtos"
  helpTexto=""
  helpIcone="help_outline"
  botaoTexto="Voltar"
  botaoIcone="arrow_back"
  botaoCor="primary"
  [botaoRota]="['/page/cadastro-tecnico/servico']"
  [mostrarDivisor]="true">

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-section-card titulo="Dados principais" subtitulo="Identifique o serviço e seu contexto de uso.">
      <div class="cadastro-form-grid cadastro-form-grid--single">
        <app-input-texto-restrito [control]="nomeControl" label="Nome" placeholder="Digite o nome do serviço">
        </app-input-texto-restrito>

        <app-input-textarea [control]="descricaoControl" label="Descrição"
          placeholder="Digite uma descrição do serviço">
        </app-input-textarea>
      </div>
    </app-section-card>

    <app-section-card titulo="Preço" subtitulo="Configure a cobrança base do serviço.">
      <app-preco-selector *ngIf="precoControl" [formGroup]="precoControl" [tiposDisponiveis]="['FIXO']">
      </app-preco-selector>
    </app-section-card>

    <div class="cadastro-form-actions" *ngIf="!isMobileView">
      <button mat-stroked-button color="primary" type="button" (click)="voltar()">
        Voltar
      </button>

      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
        {{ textoAcaoPrincipal }}
      </button>
    </div>
  </form>
</app-page-card>

<app-mobile-total-bar
  *ngIf="isMobileView"
  label="Cadastro"
  valueText="Serviço"
  detailText="Dados principais e preço"
  [expandable]="false"
  secondaryActionText="Voltar"
  [actionText]="textoAcaoPrincipal"
  [actionDisabled]="form.invalid"
  bottomOffset="58px"
  [attachedToBottomNav]="true"
  (secondaryAction)="voltar()"
  (action)="onSubmit()">
</app-mobile-total-bar>
