<div class="storage-trash">
  <div class="storage-loading" *ngIf="carregando">
    <mat-spinner diameter="36"></mat-spinner>
  </div>

  <div class="table-responsive" *ngIf="!carregando">
    <table mat-table [dataSource]="itens" class="w-100">
      <ng-container matColumnDef="preview">
        <th mat-header-cell *matHeaderCellDef>Preview</th>
        <td mat-cell *matCellDef="let item">
          <app-storage-image-preview [media]="item" variant="THUMBNAIL" [alt]="nomeArquivo(item)"></app-storage-image-preview>
        </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let item">{{ nomeArquivo(item) }}</td>
      </ng-container>

      <ng-container matColumnDef="contexto">
        <th mat-header-cell *matHeaderCellDef>Contexto</th>
        <td mat-cell *matCellDef="let item">{{ item.contexto || item.context || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let item"><app-status-badge [status]="item.status || 'LIXEIRA'"></app-status-badge></td>
      </ng-container>

      <ng-container matColumnDef="tamanho">
        <th mat-header-cell *matHeaderCellDef>Tamanho</th>
        <td mat-cell *matCellDef="let item">{{ formatBytes(item.size) }}</td>
      </ng-container>

      <ng-container matColumnDef="removidoEm">
        <th mat-header-cell *matHeaderCellDef>Removido em</th>
        <td mat-cell *matCellDef="let item">{{ item.removidoEm || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="exclusaoAgendadaEm">
        <th mat-header-cell *matHeaderCellDef>Exclusão agendada</th>
        <td mat-cell *matCellDef="let item">{{ item.exclusaoAgendadaEm || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let item">
          <button mat-icon-button type="button" *temPermissao="'STORAGE_LIXEIRA_RESTAURAR'" (click)="restaurar(item)" aria-label="Restaurar">
            <mat-icon>restore</mat-icon>
          </button>
          <button mat-icon-button color="warn" type="button" *temPermissao="'STORAGE_LIXEIRA_EXCLUIR'" (click)="excluirDefinitivo(item)" aria-label="Excluir definitivamente">
            <mat-icon>delete_forever</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas"></tr>
    </table>
  </div>

  <div class="storage-pager">
    <button mat-stroked-button type="button" [disabled]="!podeVoltar" (click)="carregar(page - 1)">Anterior</button>
    <span>Página {{ page + 1 }} · {{ totalElements }} arquivos</span>
    <button mat-stroked-button type="button" [disabled]="!podeAvancar" (click)="carregar(page + 1)">Próxima</button>
  </div>
</div>
