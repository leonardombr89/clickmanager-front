<h2 mat-dialog-title class="m-0 f-w-600">Perfil</h2>

<mat-dialog-content class="perfil-dialog-content">
  <form [formGroup]="form" class="perfil-form">
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <app-input-texto-restrito
          [control]="nomeControl"
          label="Nome do Perfil"
          placeholder="Informe o nome"
          [maxlength]="100">
        </app-input-texto-restrito>
      </div>
      <div class="col-12 col-md-6">
        <app-input-texto-restrito
          [control]="descricaoControl"
          label="Descrição"
          placeholder="Descreva o perfil"
          [maxlength]="200">
        </app-input-texto-restrito>
      </div>
    </div>

    <div class="permissoes-section">
      <div class="section-header d-flex align-items-center justify-content-between flex-wrap gap-8">
        <div class="d-flex align-items-center gap-8">
          <i-tabler name="shield" class="icon-18 text-primary"></i-tabler>
          <h3 class="f-s-14 f-w-600 m-0">Permissões</h3>
        </div>
        <mat-checkbox color="primary" [checked]="todasSelecionadas" [indeterminate]="algumasSelecionadas" (change)="selecionarTodos($event.checked)">
          Selecionar todos
        </mat-checkbox>
      </div>

      <div *ngIf="avisoProprietario" class="owner-alert">
        O proprietário da empresa possui acesso total aos módulos ativos, independentemente das permissões deste perfil.
      </div>

      <div formGroupName="permissoes" class="permissoes-modulos">
        <div *ngFor="let modulo of modulos" class="modulo-card">
          <div class="modulo-header">
            <div>
              <div class="modulo-title">{{ modulo.titulo }}</div>
              <div class="modulo-subtitle">{{ modulo.recursos.length }} recurso(s)</div>
            </div>
            <mat-checkbox
              color="primary"
              [checked]="moduloSelecionado(modulo)"
              [indeterminate]="moduloParcial(modulo)"
              (change)="selecionarModulo(modulo, $event.checked)">
              Selecionar módulo
            </mat-checkbox>
          </div>

          <div class="recursos-list">
            <div *ngFor="let recurso of modulo.recursos" class="recurso-card">
              <div class="recurso-header">
                <div class="recurso-title">{{ recurso.titulo }}</div>
                <mat-checkbox
                  color="primary"
                  [checked]="recursoSelecionado(recurso)"
                  [indeterminate]="recursoParcial(recurso)"
                  (change)="selecionarRecurso(recurso, $event.checked)">
                  Selecionar recurso
                </mat-checkbox>
              </div>

              <div class="acoes-list">
                <mat-slide-toggle
                  *ngFor="let permissao of recurso.permissoes"
                  [formControlName]="controlName(permissao)"
                  color="primary"
                  [title]="descricaoAcao(permissao) || ''">
                  {{ labelAcao(permissao) }}
                </mat-slide-toggle>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="actions-row">
  <button mat-stroked-button color="warn" (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="salvar()" [disabled]="form.invalid">Salvar</button>
</mat-dialog-actions>
