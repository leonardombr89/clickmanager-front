<div class="bloco-preview">
  <div class="bloco-preview__image">
    @if (imagemUrl) {
    <img [src]="imagemUrl" [alt]="bloco?.altText || bloco?.titulo || tipoLabel" loading="lazy" decoding="async" />
    } @else {
    <mat-icon>widgets</mat-icon>
    }
  </div>

  <div class="bloco-preview__content">
    <span>{{ tipoLabel }}</span>
    <strong>{{ bloco?.titulo || 'Sem título' }}</strong>
    <small>{{ resumo }}</small>
  </div>
</div>
