<app-page-card
  class="cadastro-form-page"
  [titulo]="tituloPagina"
  subtitulo="Organize fabricantes e marcas do catálogo do depósito."
  botaoTexto="Voltar"
  botaoIcone="arrow_back"
  botaoCor="primary"
  [botaoRota]="['/page/deposito/marcas']"
  [mostrarDivisor]="true">

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-section-card titulo="Dados principais" subtitulo="Defina código, nome e URL amigável da marca.">
      <div class="cadastro-form-grid">
        <div class="cadastro-form-grid cadastro-form-grid--triple">
          <app-input-texto-restrito
            [control]="codigoControl"
            label="Código"
            placeholder="Ex.: SANTA_LUZIA">
          </app-input-texto-restrito>

          <app-input-texto-restrito
            [control]="nomeControl"
            label="Nome"
            placeholder="Ex.: Santa Luzia">
          </app-input-texto-restrito>

          <div class="w-100">
            <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Slug</mat-label>
            <mat-form-field appearance="outline" class="w-100">
              <input matInput [formControl]="slugControl" placeholder="Ex.: santa-luzia" (input)="onSlugInput()" />
            </mat-form-field>
          </div>
        </div>

        <app-input-textarea
          [control]="descricaoControl"
          label="Descrição"
          placeholder="Resumo da marca, posicionamento ou linha principal"
          [rows]="4"
          [maxlength]="255">
        </app-input-textarea>
      </div>
    </app-section-card>

    <app-section-card titulo="Mídia e status" subtitulo="Envie a imagem da marca e controle seu destaque e disponibilidade.">
      <div class="cadastro-form-grid">
        <div class="cadastro-form-grid cadastro-form-grid--double">
          <app-deposito-imagem-upload
            context="marcas"
            label="Imagem da marca"
            [imagemAtual]="imagemSelecionada"
            (imagemSelecionada)="onImagemSelecionada($event)"
            (uploadingChange)="onUploadingImagemChange($event)">
          </app-deposito-imagem-upload>

          <div class="w-100">
            <mat-label class="f-s-14 f-w-600 m-b-8 d-block">Ordem</mat-label>
            <mat-form-field appearance="outline" class="w-100">
              <input matInput type="number" min="0" [formControl]="ordemControl" placeholder="Ex.: 1" />
            </mat-form-field>
          </div>
        </div>

        <div class="cadastro-form-toggle-grid">
          <div class="cadastro-form-toggle">
            <mat-slide-toggle [formControl]="destaqueControl">
              Marca em destaque
            </mat-slide-toggle>
            <small>Use para priorizar a marca nas vitrines e listagens.</small>
          </div>

          <div class="cadastro-form-toggle">
            <mat-slide-toggle [formControl]="ativoControl">
              Marca ativa
            </mat-slide-toggle>
            <small>Marcas inativas deixam de aparecer como opção para novos itens.</small>
          </div>
        </div>
      </div>
    </app-section-card>

    <div class="cadastro-form-actions" *ngIf="!isMobileView">
      <button mat-stroked-button color="primary" type="button" (click)="voltar()">
        Voltar
      </button>

      <button mat-flat-button color="primary" type="submit" [disabled]="!podeSalvar">
        {{ textoAcaoPrincipal }}
      </button>
    </div>
  </form>
</app-page-card>

<app-mobile-total-bar
  *ngIf="isMobileView"
  label="Depósito"
  valueText="Marca"
  detailText="Identidade, mídia e status"
  [expandable]="false"
  secondaryActionText="Voltar"
  [actionText]="textoAcaoPrincipal"
  [actionDisabled]="!podeSalvar"
  bottomOffset="58px"
  [attachedToBottomNav]="true"
  (secondaryAction)="voltar()"
  (action)="onSubmit()">
</app-mobile-total-bar>
