<h2 mat-dialog-title>Novo empréstimo parcelado</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">
  <div class="blocked-card" *ngIf="acordoBloqueado">
    {{ mensagemBloqueioAcordo }}
  </div>

  <div class="hint-card">
    Configure um empréstimo parcelado para desconto automático nas próximas competências.
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-6">
      <app-input-moeda
        [control]="valorTotalControl"
        label="Valor total"
      ></app-input-moeda>
      <small class="text-muted" *ngIf="limiteValorAcordo !== null">
        Limite pela política: {{ limiteValorAcordo | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
      </small>
      <small class="field-error" *ngIf="valorTotalControl.hasError('maxPolitica') && valorTotalControl.touched">
        Valor acima do limite percentual definido na configuração da folha.
      </small>
    </div>

    <div class="col-12 col-md-6">
      <app-input-options
        [control]="parcelasControl"
        label="Parcelas"
        [options]="opcoesParcelas"
        [showNull]="false"
      ></app-input-options>
    </div>

    <div class="col-12">
      <app-input-options
        [control]="competenciaInicioControl"
        label="Iniciar em"
        [options]="competencias"
        [showNull]="false"
      ></app-input-options>
    </div>

      <div class="col-12">
        <app-input-textarea
          [control]="descricaoControl"
          label="Descrição (opcional)"
          placeholder="Ex.: Empréstimo interno para compra de equipamento"
          [rows]="3"
        ></app-input-textarea>
      </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="confirmar()" [disabled]="form.invalid || acordoBloqueado">
    Salvar empréstimo
  </button>
</mat-dialog-actions>
