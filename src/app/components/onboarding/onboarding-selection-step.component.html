<app-section-card [titulo]="titulo" [subtitulo]="subtitulo" [divider]="true">
  <div actions>
    <span class="selection-step__count" *ngIf="!loading" [class.selection-step__count--active]="temSelecao">
      {{ contadorSelecionados }}
    </span>
  </div>

  <div class="selection-step">
    <p class="selection-step__helper" *ngIf="ajuda">{{ ajuda }}</p>

    <div class="selection-step__featured" *ngIf="!loading && sugestoes.length">
      <span class="selection-step__featured-title">{{ featuredTitle }}</span>
      <div class="selection-step__featured-list">
        <button
          type="button"
          class="selection-step__chip"
          *ngFor="let item of sugestoes"
          [class.selection-step__chip--selected]="isSelecionado(item.id)"
          (click)="onToggleSuggestion(item.id)"
        >
          <mat-icon *ngIf="isSelecionado(item.id)">check</mat-icon>
          {{ item.nome }}
        </button>
      </div>
    </div>

    <div class="selection-step__quick-actions" *ngIf="!loading && items.length">
      <span class="selection-step__quick-title">Selecionar rapidamente:</span>

      <div class="selection-step__quick-buttons">
        <button
          mat-stroked-button
          type="button"
          color="primary"
          *ngIf="!allSelected; else allSelectedState"
          (click)="toggleAll.emit(true)"
        >
          Marcar todos
        </button>

        <ng-template #allSelectedState>
          <span class="selection-step__all-selected">Todos selecionados ✓</span>
        </ng-template>

        <button
          mat-button
          type="button"
          color="primary"
          [disabled]="!temSelecao"
          (click)="toggleAll.emit(false)"
        >
          Limpar seleção
        </button>
      </div>
    </div>

    <div class="selection-step__loading" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="selection-step__grid" *ngIf="!loading">
      <label
        class="selection-step__option"
        [class.selection-step__option--selected]="selectedIds.has(item.id)"
        *ngFor="let item of items"
      >
        <mat-checkbox
          [checked]="selectedIds.has(item.id)"
          (change)="toggleItem.emit({ checked: $event.checked, id: item.id })"
        >
          <span class="selection-step__option-title">{{ item.nome }}</span>
          <span class="selection-step__option-description" *ngIf="item.descricao">{{ item.descricao }}</span>
        </mat-checkbox>
      </label>
    </div>
  </div>
</app-section-card>
