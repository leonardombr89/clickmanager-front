<mat-card class="cardWithShadow dashboard-status-card">
  <mat-card-header class="dashboard-status-card__header">
    <div>
      <mat-card-title>Status</mat-card-title>
      <mat-card-subtitle>{{ empresaNome || 'Pedidos do dia' }}</mat-card-subtitle>
    </div>

    <button mat-stroked-button type="button" class="dashboard-status-card__all-btn" (click)="abrirStatus()">
      Ver lista
    </button>
  </mat-card-header>

  <mat-card-content class="dashboard-status-card__content">
    <div class="dashboard-status-grid">
      @for (card of stats; track card.status) {
      <button type="button" class="dashboard-status-item dashboard-status-item--{{ card.color }}"
        (click)="abrirStatus(card.status)">
        <div class="dashboard-status-item__head">
          <span class="dashboard-status-item__icon text-{{ card.color }} bg-light-{{ card.color }}">
            <i-tabler [name]="card.icon" class="icon-18 d-flex"></i-tabler>
          </span>
          <span class="dashboard-status-item__label">{{ card.label }}</span>
        </div>
        <strong class="dashboard-status-item__value">{{ card.quantidade }}</strong>
      </button>
      }
    </div>
  </mat-card-content>
</mat-card>
