<mat-card class="cardWithShadow dashboard-receita-card">
  <mat-card-content class="dashboard-receita-card__content">
    <div class="dashboard-receita-card__top">
      <div>
        <span class="dashboard-receita-card__eyebrow">Receita hoje</span>
        <h2>{{ formatBRL(totalValor) }}</h2>
        <p>{{ totalPedidos }} pedidos</p>
        <small class="dashboard-receita-card__range">{{ selectedRangeLabel }}</small>
      </div>
    </div>

    <div class="dashboard-receita-card__filters">
      <button *ngFor="let r of ranges" type="button" class="dashboard-receita-card__chip"
        [class.dashboard-receita-card__chip--active]="selectedRange === r.id"
        (click)="selectedRange = r.id; onRangeChange()">
        {{ r.shortLabel }}
      </button>
    </div>

    <div class="dashboard-receita-card__body">
      <div class="dashboard-receita-card__chart">
        <ng-container *ngIf="!semMovimentacao; else receitaVazia">
          <apx-chart #chart [series]="chartData.series" [chart]="chartData.chart" [plotOptions]="chartData.plotOptions"
            [legend]="chartData.legend" [stroke]="chartData.stroke" [tooltip]="chartData.tooltip"
            [labels]="chartData.labels" [colors]="chartData.colors"></apx-chart>
        </ng-container>

        <ng-template #receitaVazia>
          <div class="dashboard-receita-card__empty-state">
            <div class="dashboard-receita-card__empty-ring">
              <div class="dashboard-receita-card__empty-copy">
                <strong>Sem receita</strong>
                <span>Nenhuma movimentação neste período</span>
              </div>
            </div>
          </div>
        </ng-template>
      </div>

      <div class="dashboard-receita-card__legend">
        <div *ngFor="let label of chartData.labels; let i = index" class="dashboard-receita-card__legend-item">
          <span class="dashboard-receita-card__legend-color" [style.background]="chartData.colors[i]"></span>
          <span class="dashboard-receita-card__legend-label">{{ label }}</span>
          <strong class="dashboard-receita-card__legend-value">{{ formatBRL(chartData.series[i] || 0) }}</strong>
        </div>
      </div>
    </div>

    <div class="dashboard-receita-card__footer">
      <button mat-flat-button color="primary" type="button" class="dashboard-receita-card__detail-btn" (click)="abrirGraficoReceita()">
        Ver gráfico →
      </button>
    </div>
  </mat-card-content>
</mat-card>
