<mat-card
    class="cardWithShadow h-100 d-flex flex-column smart-card"
    [class.smart-card--subtle]="visualStyle === 'subtle'"
    [style.min-height.px]="cardMinHeight">
    <mat-card-header>
        <mat-card-title class="f-s-16 f-w-600">
            {{ label }} <span *ngIf="isRequired" style="color:#ff110094">*</span>
        </mat-card-title>
        <div class="selected-count" *ngIf="showSelectedCount && selectedCount">
            {{ selectedCount }} selecionada(s)
        </div>
    </mat-card-header>

    <div class="smart-search px-12">
        <mat-form-field appearance="outline" class="w-100">
            <input matInput type="text" [formControl]="filtroControl" [placeholder]="searchPlaceholder" autocomplete="off" />
        </mat-form-field>
    </div>

    <!-- scroll aqui garante barra colada à borda direita do card -->
    <mat-card-content class="smart-card-content" [style.height.px]="listHeight">
        <ng-container *ngIf="options?.length; else vazio">
            <mat-selection-list [formControl]="control" class="smart-list">
                <mat-list-option *ngFor="let option of filteredOptions; trackBy: trackById" [value]="option.id">
                    {{ option.nome }}
                </mat-list-option>
            </mat-selection-list>
            <div *ngIf="!filteredOptions.length" class="text-body f-s-12 px-12 py-8">Nenhum resultado encontrado.</div>
        </ng-container>
        <ng-template #vazio>
            <div class="text-body f-s-12 px-12 py-8">Nenhuma opção disponível.</div>
        </ng-template>
    </mat-card-content>
</mat-card>

<div *ngIf="control?.invalid && control?.touched" class="text-body f-s-12 text-error mt-4">
    {{ errorMessage() }}
</div>
